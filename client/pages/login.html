<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ParkIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
.auth-page { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
.auth-left {
  background: var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; justify-content:space-between; padding:3rem;
  position:relative; overflow:hidden;
}
.auth-left-bg {
  position:absolute; inset:0; z-index:0;
  background-image: linear-gradient(rgba(245,166,35,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,166,35,0.04) 1px,transparent 1px);
  background-size:50px 50px;
}
.auth-left-glow {
  position:absolute; bottom:-100px; left:-100px; width:400px; height:400px; z-index:0;
  background:radial-gradient(circle,rgba(245,166,35,0.1) 0%,transparent 65%);
  pointer-events:none;
}
.auth-left-content { position:relative; z-index:1; }
.auth-left-bottom  { position:relative; z-index:1; }
.auth-quote {
  font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800;
  line-height:1.3; margin:3rem 0 1.5rem;
  color: #F0EDE6;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.auth-quote em { color: #F5A623; font-style:normal; }
.auth-stat-row { display:flex; gap:2rem; margin-top:2rem; }
.auth-stat-num { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; color:var(--amber); }
.auth-stat-lbl { font-size:0.75rem; color:#9CA3AF; }
.auth-testimonial {
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:var(--radius-md); padding:1.25rem; margin-top:2rem;
}
.auth-testimonial p { font-size:0.875rem; color:var(--muted); font-style:italic; margin-bottom:0.75rem; }
.auth-testimonial-author { display:flex; align-items:center; gap:10px; }
.auth-testimonial-author .avatar { width:32px; height:32px; font-size:0.7rem; }

.auth-right {
  display:flex; align-items:center; justify-content:center;
  padding:3rem 2rem; background:var(--bg);
}
.auth-form-wrap { width:100%; max-width:420px; }
.auth-form-wrap h1 { font-size:1.8rem; margin-bottom:0.4rem; }
.auth-form-wrap .subtitle { color:var(--muted); font-size:0.9rem; margin-bottom:2rem; }

.divider-or {
  display:flex; align-items:center; gap:1rem; margin:1.5rem 0;
  color:var(--muted); font-size:0.8rem;
}
.divider-or::before, .divider-or::after { content:''; flex:1; border-top:1px solid var(--border); }

.social-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:0.7rem; border:1px solid var(--border); border-radius:var(--radius-sm);
  background:transparent; color:var(--text); font-size:0.9rem; cursor:pointer;
  transition:border-color .2s, background .2s; font-family:'DM Sans',sans-serif;
}
.social-btn:hover { border-color:rgba(255,255,255,0.2); background:var(--bg3); }

.form-stack { display:flex; flex-direction:column; gap:1.1rem; }
.pw-wrap { position:relative; }
.pw-wrap input { padding-right:2.5rem; }
.password-toggle {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--muted); display:flex; align-items:center;
  transition:color .2s;
}
.password-toggle:hover { color:var(--text); }

.forgot-link { font-size:0.8rem; color:var(--amber); text-align:right; display:block; margin-top:4px; }
.auth-switch { text-align:center; font-size:0.875rem; color:var(--muted); margin-top:1.5rem; }
.auth-switch a { color:var(--amber); }

@media (max-width:800px) {
  .auth-page { grid-template-columns:1fr; }
  .auth-left  { display:none; }
}
</style>
</head>
<body>
<div id="page-loader" class="page-loader"><div class="spinner"></div></div>
<div id="toast-container"></div>

<div class="auth-page">
  <!-- Left panel -->
  <div class="auth-left">
    <div class="auth-left-bg"></div>
    <div class="auth-left-glow"></div>

    <div class="auth-left-content">
      <a href="../index.html" class="nav-logo" style="font-size:1.5rem;margin-bottom:0.5rem"><div class="logo-dot"></div>Park<span>IQ</span></a>
      <div class="auth-quote">
        Your spot is <em>waiting.</em><br>Sign in and park smarter.
      </div>
      <div class="auth-stat-row">
  <div>
    <div class="auth-stat-num" id="stat-locations">0</div>
    <div class="auth-stat-lbl">Parking locations</div>
  </div>

  <div>
    <div class="auth-stat-num" id="stat-users">0</div>
    <div class="auth-stat-lbl">Happy drivers</div>
  </div>

  <div>
    <div class="auth-stat-num" id="stat-rating">0★</div>
    <div class="auth-stat-lbl">Average rating</div>
  </div>
</div>
    </div>

    <div class="auth-testimonial">
  <p id="featured-review">
    Loading review...
  </p>

  <div class="auth-testimonial-author">
    <div class="avatar avatar-sm" id="review-avatar">--</div>

    <div>
      <div id="review-name" style="font-size:.8rem;font-weight:500">
        Loading...
      </div>

      <div id="review-location" style="font-size:.7rem;color:var(--muted)">
        Loading...
      </div>
    </div>
  </div>
</div>
  </div>

  <!-- Right panel -->
  <div class="auth-right">
    <div class="auth-form-wrap">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your ParkIQ account</p>

      <form id="login-form" class="form-stack" novalidate>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email">
          <span class="form-error hidden" data-error="email"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrap">
            <input type="password" name="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="password-toggle" data-target="login-password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error hidden" data-error="password"></span>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content:center;margin-top:.5rem">
          Sign in
        </button>
      </form>

      <div class="divider-or">or continue with</div>

      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one free →</a>
      </div>

      <div style="text-align:center;margin-top:1rem">
        <a href="../index.html" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--muted);text-decoration:none;padding:.45rem .9rem;border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color .2s,color .2s" onmouseover="this.style.borderColor='rgba(245,166,35,.5)';this.style.color='var(--amber)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Home
        </a>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/auth.js"></script>
<script>
async function loadLoginStats() {
  try {
    const res = await fetch('/api/users/public/login-stats');
    const data = await res.json();

    document.getElementById('stat-locations').textContent =
      data.parkingLocations || 0;

    document.getElementById('stat-users').textContent =
      data.users || 0;

    document.getElementById('stat-rating').textContent =
      (data.averageRating || 0) + '★';

    if (data.featuredReview) {
      document.getElementById('featured-review').textContent =
        `"${data.featuredReview.comment}"`;

      document.getElementById('review-name').textContent =
        data.featuredReview.name;

      document.getElementById('review-location').textContent =
        data.featuredReview.location || '';

      document.getElementById('review-avatar').textContent =
        data.featuredReview.name
          .split(' ')
          .map(x => x[0])
          .join('')
          .substring(0, 2)
          .toUpperCase();
    }
  } catch (err) {
    console.error('Failed loading login stats', err);
  }
}

document.addEventListener('DOMContentLoaded', loadLoginStats);
</script>
</body>
</html>
