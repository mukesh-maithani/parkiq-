<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkIQ – Payment Result</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }
    .card {
      background: #fff;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; line-height: 1; }
    h2 { font-size: 1.4rem; color: #1e293b; margin-bottom: .5rem; }
    p  { font-size: .95rem; color: #64748b; line-height: 1.6; }
    .detail { margin-top: 1rem; background: #f8fafc; border-radius: .5rem; padding: .75rem 1rem; font-size: .9rem; color: #334155; }
    .detail span { font-weight: 600; color: #1e293b; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      margin-top: 1.5rem;
      padding: .65rem 1.5rem;
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: .5rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #d97706; }
    .btn-close {
      background: #64748b;
      margin-left: .5rem;
    }
    .btn-close:hover { background: #475569; }
    .auto-note { font-size: .8rem; color: #94a3b8; margin-top: .75rem; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Processing…</h2>
  <p id="msg">Please wait.</p>
</div>

<script>
(function () {
  const params     = new URLSearchParams(window.location.search);
  const status     = params.get('status');       // 'success' | 'failed'
  const bookingCode= params.get('bookingCode');
  const amount     = params.get('amount');
  const message    = params.get('message');

  const card    = document.getElementById('card');
  const spinner = document.getElementById('spinner');
  const titleEl = document.getElementById('title');
  const msgEl   = document.getElementById('msg');

  spinner.style.display = 'none';

  if (status === 'success') {
    // ── SUCCESS ──────────────────────────────────────────────
    titleEl.textContent = 'Payment Successful!';
    msgEl.textContent   = 'Your booking has been confirmed.';

    if (bookingCode) {
      const detail = document.createElement('div');
      detail.className = 'detail';
      detail.innerHTML = `Booking Code: <span>${bookingCode}</span>${amount ? `<br>Amount Paid: <span>₹${parseFloat(amount).toFixed(2)}</span>` : ''}`;
      card.insertBefore(detail, card.children[2]);
    }

    // Icon
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.textContent = '✅';
    card.insertBefore(icon, card.firstChild);

    // Buttons
    const btnWrap = document.createElement('div');
    btnWrap.innerHTML = `<button class="btn" id="goBookings">My Bookings</button><button class="btn btn-close" id="closeTab">Close Tab</button>`;
    card.appendChild(btnWrap);
    document.getElementById('goBookings').onclick = () => {
      if (window.opener && !window.opener.closed) {
        window.opener.location.href = '/pages/booking-history.html';
        window.close();
      } else {
        window.location.href = '/pages/booking-history.html';
      }
    };
    document.getElementById('closeTab').onclick = () => window.close();

    const note = document.createElement('p');
    note.className = 'auto-note';
    note.textContent = 'This tab will close automatically in 4 seconds.';
    card.appendChild(note);

    // Notify booking page if still open
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'RAZORPAY_PAYMENT_RESULT',
        success: true,
        bookingCode,
        amount
      }, window.location.origin);
    }
    setTimeout(() => window.close(), 4000);

  } else {
    // ── FAILURE ───────────────────────────────────────────────
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.textContent = '❌';
    card.insertBefore(icon, card.firstChild);

    titleEl.textContent = 'Payment Failed';
    msgEl.textContent   = message || 'The payment could not be completed. Please try again.';

    const btnWrap = document.createElement('div');
    btnWrap.innerHTML = `<button class="btn" id="tryAgain">Try Again</button><button class="btn btn-close" id="closeTab">Close Tab</button>`;
    card.appendChild(btnWrap);

    document.getElementById('tryAgain').onclick = () => {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'RAZORPAY_PAYMENT_RESULT',
          success: false,
          message: message || 'Payment failed'
        }, window.location.origin);
        window.close();
      } else {
        window.history.back();
      }
    };
    document.getElementById('closeTab').onclick = () => {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'RAZORPAY_PAYMENT_RESULT',
          success: false,
          message: message || 'Payment failed'
        }, window.location.origin);
      }
      window.close();
    };

    // Notify booking page of failure
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'RAZORPAY_PAYMENT_RESULT',
        success: false,
        message: message || 'Payment failed'
      }, window.location.origin);
    }
  }
})();
</script>
</body>
</html>
